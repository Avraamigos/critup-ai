<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Swoosh: lower-left start, V-dip, sweeps up to upper-right -->
  <path
    d="M 52 265 C 68 315 102 390 182 408 C 248 424 295 336 368 200 C 394 153 416 116 436 88"
    stroke="#FF6600" stroke-width="62" stroke-linecap="round" stroke-linejoin="round" fill="none"
  />
  <!-- Arrowhead: L-bracket at top-right corner creates the chevron (same trick as CritupLogo) -->
  <path
    d="M 380 58 L 458 58 L 458 136"
    stroke="#FF6600" stroke-width="60" stroke-linecap="round" stroke-linejoin="round" fill="none"
  />
</svg>
